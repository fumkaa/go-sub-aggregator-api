openapi: 3.0.3
info:
  title: Subscription Aggregator API
  description: API for managing service subscriptions and calculating total costs for users.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

components:
  schemas:
    Subscription:
      type: object
      required:
        - service_name
        - price
        - user_id
        - start_date
      properties:
        id:
          type: string
          format: uuid
          example: "cf5bd17f-9478-4b8b-8724-d70eb4af2e64"
        service_name:
          type: string
          minLength: 2
          example: "Yandex Plus"
        price:
          type: integer
          description: Cost in Rubles (monthly)
          minimum: 1
          example: 400
        user_id:
          type: string
          format: uuid
          example: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
        start_date:
          type: string
          pattern: '^(0[1-9]|1[0-2])-[0-9]{4}$'
          description: Month and year when the subscription started (MM-YYYY)
          example: "01-2026"
        end_date:
          type: string
          nullable: true
          pattern: '^(0[1-9]|1[0-2])-[0-9]{4}$'
          description: Month and year when the subscription ends (MM-YYYY)
          example: "12-2026"

paths:
  /subscriptions:
    post:
      summary: Create a new subscription
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Subscription'
      responses:
        '201':
          description: Subscription created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Validation error or invalid JSON

    get:
      summary: Get all user subscriptions with pagination
      tags:
        - Subscriptions
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          description: Number of records to return (default 10, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: offset
          in: query
          description: Number of records to skip (default 0)
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of subscriptions retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
        '400':
          description: Invalid user_id or pagination parameters

  /subscriptions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a subscription by ID
      tags:
        - Subscriptions
      responses:
        '200':
          description: Subscription found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          description: Subscription not found

    put:
      summary: Update subscription details
      tags:
        - Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Subscription'
      responses:
        '200':
          description: Subscription updated successfully
        '404':
          description: Subscription not found

    delete:
      summary: Delete a subscription
      tags:
        - Subscriptions
      responses:
        '200':
          description: Subscription deleted successfully
        '404':
          description: Subscription not found

  /subscriptions/total:
    get:
      summary: Calculate total cost of subscriptions
      description: >
        Get the sum of all subscription prices for a specific user. 
        Calculates cost based on the number of active months within the specified period.
        If no period is provided, calculates total cost for the entire duration of subscriptions.
      tags:
        - Aggregation
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: service_name
          in: query
          description: Filter by specific service name
          schema:
            type: string
        - name: start_date
          in: query
          description: Start of the calculation period (MM-YYYY)
          schema:
            type: string
            pattern: '^(0[1-9]|1[0-2])-[0-9]{4}$'
        - name: end_date
          in: query
          description: End of the calculation period (MM-YYYY)
          schema:
            type: string
            pattern: '^(0[1-9]|1[0-2])-[0-9]{4}$'
      responses:
        '200':
          description: Calculation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  sum:
                    type: integer
                    description: Total cost for the period
                    example: 59800
        '400':
          description: Invalid parameters